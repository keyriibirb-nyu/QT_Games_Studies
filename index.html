<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1"/>

    <title>Q&T Games Studies Final</title>
    <link rel="stylesheet" href="./CSS/styles.css"/>
</head>

<body>
    <main>
        <div class="img_container">
            <img src="./img/tiles.png"/>
        </div>

        <div class="vert_container">
            <!-- left bar -->
            <div class="vert_barL"></div> 
            <!-- middle bar -->
            <div class="vert_barM"></div>
            <!-- right bar -->
            <div class="vert_barR"></div>
        </div>
    
        
        <div class="horz_container">
            <!-- top bar -->
            <div class="horz_barT"></div>
            <!-- middle bar -->
            <div class="horz_barM"></div>
            <!-- bottom bar -->
            <div class="horz_barB"></div>
        </div>

    <div class="error">

        <p>Hi! You're out of bounds, your window is either too small or too large. Change the window size!</p>
